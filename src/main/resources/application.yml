spring:
  application:
    name: E-Commerce-order-Management-Module-1

  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_order_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8080
